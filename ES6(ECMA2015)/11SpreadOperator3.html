<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
        위의 경우와 반대로, 함수 정의 쪽이 아니라 함수를 Call 할 때 
        spread operator를 사용할 수 있습니다. 기존에는 배열로 되어있는 
        내용을 함수의 인자로 넣어주려면 손으로(?) 풀어서 넣어주던지, 
        Apply를 이용했어야 하지만 spread operator를 이용하면 
        배열 형태에서 바로 함수 인자로 넣어줄 수 있습니다.
        */
        //es5 방식
        var numbers = [9, 4, 7, 1]; 
        let result1 = Math.min(numbers[0], numbers[1], numbers[2], numbers[3]);
        console.log("결과1", result1);

        //es6의 스프레드 연산자 사용
        let result2 = Math.min(...numbers);
        console.log("결과2", result2);

        var input = [{name:'철수',age:12}, {name:'영희',age:12}, {name:'바둑이',age:2}];
        var minAge = Math.min(...input.map((item) => item.age));
        console.log('가장어린나이', minAge); // 2


        //기존 객체에 프로퍼티 추가하기
        var currentState = { name: '철수', species: 'human'};
        currentState = { ...currentState, age: 10}; 
        console.log(currentState);

        //프로퍼티 업데이트 하기 
        currentState = { ...currentState, name: '영희', age: 11}; 
        console.log(currentState);
    </script>
</body>
</html>
