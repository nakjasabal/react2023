<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    /*
    구조분해할당(destructuring assignment)

    구조 분해 할당 구문은 배열이나 객체의 속성을 해체하여 그 값을 개별 변수에 
    담을 수 있게 하는 JavaScript 표현식입니다.
    */

// 이름과 성을 요소로 가진 배열
let arr1 = ["Bora", "Lee"]
// 구조 분해 할당을 이용해
// firstName엔 arr[0]을
// surname엔 arr[1]을 할당하였습니다.
let [firstName1, surname1] = arr1;

console.log(firstName1); // Bora
console.log(surname1);  // Lee

//////////////////////////////////////

let [firstName2, surname2] = "Bora Lee".split(' ');
console.log(firstName2); // Bora
console.log(surname2);  // Lee

////////////////////////////////////////


// 두 번째 요소는 필요하지 않음
let [firstName, , title] = ["Julius", "Caesar", "Consul", "of the Roman Republic"];
console.log( title ); // Consul 

////////////////////////////////////////////


let [name1, name2, ...rest] = ["Julius", "Caesar", "Consul", "of the Roman Republic"];

console.log(name1); // Julius
console.log(name2); // Caesar

// `rest`는 배열입니다.
console.log(rest[0]); // Consul
console.log(rest[1]); // of the Roman Republic
console.log(rest.length); // 2






    </script>
</body>
</html>
