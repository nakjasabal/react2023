    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
/*
참조1
https://eblee-repo.tistory.com/38


참조2
https://poiemaweb.com/es6-template-literals


ES6는 템플릿 리터럴(Template literal)이라고 불리는 새로운 문자열 표기법을 도입하였다. 
템플릿 리터럴은 일반 문자열과 비슷해 보이지만, ‘ 또는 “ 같은 통상적인 따옴표 문자 대신 
백틱(backtick) 문자 `를 사용한다.
*/

/*
ES6 템플릿 리터럴은 일반적인 문자열과 달리 여러 줄에 걸쳐 문자열을 작성할 수 있으며 
템플릿 리터럴 내의 모든 white-space는 있는 그대로 적용된다.
*/    
        console.log("오늘은 좋은날\n"+
            "내일도 좋은날");
        console.log(`오늘은 좋은날
내일도 좋은날`);

/*
Expression interpolation(표현식 삽입법)
템플릿 리터럴은 + 연산자를 사용하지 않아도 간단한 방법으로 새로운 문자열을 삽입할 수 있는 
기능을 제공한다. 이를 문자열 인터폴레이션(String Interpolation)이라 한다.
*/
        var a = 5;
        var b = 10;
        console.log("Fifteen is " + (a + b) + " and\nnot " + (2 * a + b) + ".");

        console.log(`Fifteen is ${a + b} and
not ${2 * a + b}.`);


        const template = `템플릿 리터럴은 '작은따옴표(single quotes)'과 "큰따옴표(double quotes)"를 혼용할 수 있다.`;
        console.log(template);
    </script>
</body>
