<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    /*
    Arrow Functions
    화살표 함수는 function 키워드 없이 함수를 만들 수 있으며,
    return 키워드 없이, 식을 계산한 값이 자동으로 반환됩니다.
    () 안에 함수의 인자가 들어가고, => 오른쪽에는 결과를 반환하는 식입니다.
    */

    //기존 ES5에서 사용한 함수
    var sumLimit1 = function (start, end) {
        var sum = 0;
        for(var i=start ; i<=end ; i++){
            sum += i;
        }
        return sum;
    }
    var result = sumLimit1(1, 10);
    console.log("result="+result);

    /*
    ES6의 Arrow function(화살표함수) 
    : Java의 람다식과 비슷하다. 기존의 함수에서 function이 제거되고
    괄호사이에 => 와같이 화살표가 들어간다. 
    형식] let 함수명 = (파라미터) => {함수의 내용;}
    */
    let sumLimit2 = (start, end) => {
        let sum2 = 0;
        for(var i=start ; i<=end ; i++){
            sum2 += i;
        }
        return sum2;
    }
    let result2 = sumLimit2(1, 100);
    console.log("result2="+result2);

    helloStr = (val) => "Hello " + val;
    window.onload = () => {
        document.getElementById("myPoint").innerHTML 
            = helloStr("World!!!");
    }
    </script>
    <p id="myPoint"></p>
</body>
</html>
